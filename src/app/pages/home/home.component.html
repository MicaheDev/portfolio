<app-hero />
<section class="m-auto min-h-[90svh] w-[90%] overflow-hidden py-8">
  <div class="animate-pulse">
    <h3 class="text-9xl font-bold uppercase text-purple-300">Experience</h3>
  </div>

  <div
    class="flex h-[15vh] justify-between overflow-hidden border-b border-t border-neutral-700 p-4 transition-all"
    [ngClass]="{
      'h-[30vh]': expand
    }"
    (click)="resize()"
  >
    <div class="flex w-2/3 items-center gap-4">
      <span class="h-[50px] w-[50px] text-5xl">
        <i
          [ngClass]="{
            'ri-add-line': !expand,
            'ri-subtract-line': expand
          }"
        ></i>
      </span>
      <div>
        <h6 class="text-2xl font-semibold">Ubiqq - SPA</h6>
        <p>
          Lorem ipsum dolor sit amet, consectetur adipisicing elit. Quaerat
          ducimus consequuntur porro, earum optio quos! Explicabo aspernatur
          illo id expedita blanditiis odit neque rerum rem laudantium earum
          repudiandae, amet architecto.
        </p>
      </div>
    </div>
    <div class="1/3">
      <span>04/2024 - 05/2025</span>
    </div>
  </div>
</section>
