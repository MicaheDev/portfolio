<div #motionContainer>
  <nav class="h-[100px] w-[95%] bg-violet-100 bg-opacity-55 left-0 right-0 mx-auto box-border top-0 bg-transparent backdrop-blur-sm flex justify-between fixed items-center border-b border-b-gray-400">
    <a
      href="#"
      class="w-[100px] h-full bg-black font-extrabold text-white inline-flex justify-center items-center text-5xl"
      ><img class="w-[90%]" src="/logo.png" alt=""
    /></a>

    <div class="h-full border-x border-x-gray-400 max-md:border-none flex items-center justify-center w-1/3">{{ date }}</div>

    <button class="h-full w-[200px] max-md:w-[100px] border-l border-l-gray-400 border-r border-r-gray-400 box-border justify-center inline-flex items-center gap-3 bg-black open-btn" (click)="toggleMenu()">
      <div class="flex flex-col gap-2 open-icon text-white text-4xl">
        <ng-icon name="remixMenuLine" />
      </div>
      <span class="text-2xl max-md:hidden text-white font-extrabold uppercase">Menu</span>
    </button>
  </nav>
  <div class="h-[100px]"></div>

  <menu class="fixed w-full h-full inset-0 z-10 bg-black menu">
    <div class="w-[95%] m-auto h-full border-x border-x-gray-400">
      <nav class="h-[100px] flex justify-between items-center border-b border-b-gray-400">
        <a
          href="#"
          class="w-[100px] h-full bg-black font-extrabold text-white inline-flex justify-center items-center text-5xl"
          ><img class="w-[90%]" src="/logo.png" alt=""
        /></a>

        <div class="h-full border-x border-x-gray-400 max-md:border-none text-white flex items-center justify-center w-1/3">
          {{ date }}
        </div>

        <button class="h-full w-[200px] border-l border-l-gray-400 max-md:w-[100px] box-border justify-center  inline-flex items-center gap-3 bg-black close-btn" (click)="toggleMenu()">
          <div class="flex flex-col gap-2 close-icon text-white text-4xl">
            <ng-icon name="remixCloseFill" />
          </div>
          <span class="text-2xl max-md:hidden text-white font-extrabold uppercase">Menu</span>
        </button>
      </nav>
      <div class="h-[95vh] border-b border-b-gray-400 text-white text-8xl max-md:text-5xl uppercase font-extrabold flex flex-col">
        @for (item of menuItems; track item.path) {
        <a
          [routerLink]="item.path"
          (click)="toggleMenu()"
          class="p-4 border-b border-b-gray-400 text-right transition-colors hover:bg-violet-500 cursor-pointer ease-linear"
        >
          {{ item.label }}
        </a>
        }
      </div>
    </div>
  </menu>
</div>
