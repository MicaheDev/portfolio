<nav class="fixed inset-x-0 top-0 z-20 m-auto max-w-[1400px] bg-white px-2 pt-2">
  <div class="flex h-[60px] w-full items-center justify-between border-b-2 border-black">
    <ul class="flex h-full items-center max-md:hidden">
      @for (item of menuItems; track item.path) {
        <li class="h-full max-md:hidden">
          <a
            class="relative inline-flex h-full cursor-pointer items-center justify-center border-x-2 border-t-2 border-transparent px-5 text-xl lowercase transition-all duration-200 ease-custom-bezier hover:bg-neutral-200"
            (click)="transitionClick(item.path)"
            [ngClass]="{
              'border-t-8 border-x-black border-t-black': isActive(item.path),
            }"
          >
            {{ item.label }}.tsx
          </a>
        </li>
      }
    </ul>

    <a (click)="transitionClick('/')" class="w-[200px] max-md:w-[150px]">
      <img src="/logotext.svg" width="200" alt="micahedev logo" />
    </a>

    <ul class="hidden h-full items-center max-md:flex">
      <li class="h-full">
        <button
          (click)="toggleMenu()"
          class="relative inline-flex h-full cursor-pointer items-center justify-center border-x-2 border-t-8 border-transparent border-x-black border-t-black px-5 text-xl lowercase transition-all duration-200 ease-custom-bezier hover:bg-neutral-200"
        >
          <ng-icon name="remixMenuLine" />
        </button>
      </li>
    </ul>
  </div>
</nav>
