<nav class="fixed inset-x-0 top-0 z-50 bg-white px-2 pt-2 max-w-[1400px] m-auto">
  <div class="flex h-[60px] w-full items-center justify-between border-b-2 border-black">
    <ul class="flex h-full items-center max-md:hidden">
      @for (item of menuItems; track item.path) {
        <li class="h-full">
          <a
            class="relative cursor-pointer inline-flex h-full items-center justify-center border-x-2 border-t-2 border-transparent px-5 text-xl lowercase transition-all duration-200 ease-custom-bezier hover:bg-neutral-200"
            (click)="transitionClick(item.path)"
            [ngClass]="{
              'border-x-black border-t-8 border-t-black': isActive(item.path),
            }"
          >
            {{ item.label }}.tsx
          </a>

          <app-transition-link />
        </li>
      }
    </ul>

    <a (click)="transitionClick('/')" class="w-[200px] max-md:w-[150px]">
      <img src="/logotext.svg" width="200" alt="micahedev logo" />
    </a>
  </div>
</nav>
<div class="h-[60px] w-full"></div>
