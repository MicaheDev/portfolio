<section class="relative h-[100vh] max-md:h-auto max-md:py-20 w-full overflow-hidden border-x-2 border-black">
  <div class="mx-auto flex h-full w-[90%] items-center justify-center gap-5 max-md:flex-col-reverse">
    <div class="flex w-full flex-wrap justify-around gap-5">
      @for (item of certifications; track $index) {
        <div class="relative flex h-[350px] w-[500px] aspect-video max-md:h-auto max-md:w-[300px] items-center justify-center border-2 border-black p-2 max-md:p-4 bg-white">
          <img class="w-full max-md:object-contain" [ngSrc]="item.preview.url" fill [alt]="item.preview.alt" />
          <h3 class="text-vertical absolute bottom-0 right-[100%] max-md:right-0 rotate-180 max-md:rotate-0 max-md:bg-white">{{ item.title }}</h3>
        </div>
      }
    </div>
    <div class="flex h-full w-[10%] max-md:w-full items-center justify-center">
      <h2 class="-rotate-90 max-md:rotate-0 text-[6rem] leading-[6rem] max-md:text-5xl max-md:leading-normal font-extrabold uppercase" >Certifications</h2>
