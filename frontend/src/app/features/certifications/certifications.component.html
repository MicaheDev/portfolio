<section class="relative h-auto py-20 w-full overflow-hidden border-x-2 border-black ">
  <div class="mx-auto flex h-full w-[90%] items-center justify-center gap-5 max-md:flex-col-reverse">
    <div class="flex w-full flex-wrap justify-around gap-5">
      @for (item of certifications; track $index) {
        <div
          class="relative flex aspect-video h-[350px] w-[500px] items-center justify-center border-2 border-black bg-white p-2 max-md:h-auto max-md:w-[300px] max-md:p-4"
        >
          <img class="w-full max-md:object-contain" [ngSrc]="item.preview.url" fill [alt]="item.preview.alt" />
          <h3
            class="text-vertical absolute bottom-0 right-[100%] rotate-180 max-md:right-0 max-md:rotate-0 max-md:bg-white"
          >
            {{ item.title }}
          </h3>
        </div>
      }
    </div>
    <div class="flex h-full w-[10%] items-center justify-center max-md:w-full">
      <h2
        class="-rotate-90 text-[6rem] font-extrabold uppercase leading-[6rem] max-md:rotate-0 max-md:text-5xl max-md:leading-normal"
      >
        Certifications
      </h2>
    </div>
  </div>
