<div class="mb-4 opacity-0 translate-y-5 project">
  <div class="bg-noise h-[80vh] w-full overflow-hidden rounded-t-3xl rounded-br-3xl max-md:h-[60vh]">
      <div class="w-full h-full p-8 flex relative" [style]="{ background: project.color }">
        <a [routerLink]="project.slug" class="w-full h-full">

          <img
          class="w-full object-contain h-full"
          [src]="project.preview.url"
          [alt]="project.preview.alt"
        />
        </a>

        <div
          class="absolute bottom-0 left-0 overflow-ellipsis bg-neutral-950 text-white rounded-tr-[60px] flex justify-start  py-8 pr-8"
        >
          <h1
            class="text-8xl text-nowrap max-md:text-wrap max-md:text-4xl overflow-ellipsis overflow-hidden max-w-[1200px] max-xl:max-w-[500px] max-md:max-w-[150px] font-extrabold uppercase"
          >
            {{ project.title }}
          </h1>

          <div
            class="absolute bg-white w-[50px] h-[50px] bg-opacity-0 content-normal bottom-0 left-[100%] rounded-bl-[30px] curve-l"
          ></div>
          <div
            class="absolute bg-white w-[50px] h-[50px] bg-opacity-0 content-normal bottom-[100%] left-0 rounded-bl-[30px] curve-l"
          ></div>
        </div>

        @if(project.projectUrl){
          <a
          [routerLink]="project.projectUrl"
          class="absolute flex justify-center items-center group overflow-hidden text-4xl max-md:text-2xl duration-300 max-md:w-[50px] max-md:h-[50px] w-[100px] max-md:p-0 h-[100px] top-0 right-0 m-5 max-md:m-2 rounded-3xl text-white p-8 bg-neutral-950"
        >
          <ng-icon name="remixArrowRightUpLine" />

          <div
            class="absolute top-0 bottom-0 w-full h-full text-neutral-950 transition-transform rounded-3xl -translate-x-[100%] group-hover:translate-x-0 bg-white flex justify-center items-center text-4xl  max-md:text-2xl"
          >
            <ng-icon name="remixArrowRightUpLine" />
          </div>
        </a>
        }
      </div>
  </div>

  <div class="flex gap-4 items-end  text-white max-md:flex-col max-md:items-start max-md:gap-0">
    <div class="py-8">
      <p class="text-white truncated-text">
        {{ project.desc }}
      </p>
    </div>
    <div class="flex flex-col py-8 w-full gap-4">
      <h4 class="text-nowrap text-right">{{ project.date | date : 'short' }}</h4>
      <div class="flex gap-2 justify-end ">
        @for (category of project.category.slice(0,3); track $index) {
        <span
          class="px-8 max-md:max-w-[300px] max-md:px-2 max-md:overflow-hidden max-md:overflow-ellipsis text-nowrap py-2 rounded-lg bg-neutral-700 text-white"
          >{{ category }}</span
        >
        }
      </div>
    </div>
  </div>
</div>
