<div class="my-4">
  <div class="bg-noise h-[80vh] w-full overflow-hidden rounded-t-3xl rounded-br-3xl">
    <div class="w-full h-full bg-neutral-900 bg-opacity-90 flex">
      <div class="w-full h-full p-8 relative" [style]="{ background: project.color }">
        <img
          class="w-full object-contain h-full hover:scale-75 hover:rotate-2 duration-300 transition-transform"
          [src]="project.preview"
          alt=""
        />

        <div
          class="absolute bottom-0 left-0 overflow-ellipsis bg-neutral-950 text-white rounded-tr-[60px] flex justify-start projects-center py-8 pr-8"
        >
          <h1
            class="text-8xl text-nowrap max-md:text-wrap max-md:text-4xl overflow-ellipsis overflow-hidden max-w-[1200px] max-xl:max-w-[500px] max-md:max-w-[150px] font-extrabold uppercase"
          >
            {{ project.title }}
          </h1>

          <div
            class="absolute bg-white w-[50px] h-[50px] bg-opacity-0 content-normal bottom-0 left-[100%] rounded-bl-[30px] curve-l"
          ></div>
          <div
            class="absolute bg-white w-[50px] h-[50px] bg-opacity-0 content-normal bottom-[100%] left-0 rounded-bl-[30px] curve-l"
          ></div>
        </div>

        <a
          [routerLink]="project.slug"
          class="absolute flex justify-center group overflow-hidden text-4xl duration-300 w-[100px] h-[100px] top-0 right-0 m-5 rounded-3xl text-white p-8 bg-neutral-950"
        >
          <ng-icon name="remixArrowRightUpLine" />

          <div
            class="absolute top-0 bottom-0 w-full h-full text-neutral-950 transition-transform rounded-3xl -translate-x-[100%] group-hover:translate-x-0 bg-white flex justify-center items-center text-4xl "
          >
            <ng-icon name="remixArrowRightUpLine" />
          </div>
        </a>
      </div>
    </div>
  </div>

  <div class="flex gap-4 projects-center text-white max-md:flex-col max-md:projects-start max-md:gap-0">
    <div class="py-8">
      <p class="text-white truncated-text">
        {{ project.desc }}
      </p>
    </div>
    <div class="flex flex-col py-8 w-full gap-4">
      <h4 class="text-nowrap text-right">{{ project.date | date : 'short' }}</h4>
      <div class="flex gap-2 justify-end projects-center">
        @for (category of project.category.slice(0,3); track $index) {
        <span
          class="px-8 max-md:max-w-[300px] max-md:px-2 max-md:overflow-hidden max-md:overflow-ellipsis text-nowrap py-2 rounded-lg bg-neutral-700 text-white"
          >{{ category }}</span
        >
        }
      </div>
    </div>
  </div>
</div>
