<div
  class="pointer-events-none fixed inset-0 z-10 flex h-[500px] w-[800px] items-center justify-center overflow-hidden border-2 border-black bg-black"
  #container
>
  <div [style]="{ top: modalState.index * -100 + '%' }" class="slider_transition absolute h-full w-full" #slider>
    @for (project of projects; track $index; let index = $index) {
      <div class="relative flex h-full items-center justify-center">
        <img class="h-auto" [src]="project.preview.url" width="700" height="0" [alt]="project.preview.alt" />
      </div>
    }
  </div>
</div>

<div
  class="pointer-events-none fixed z-20 flex h-[80px] w-[80px] items-center justify-center bg-black text-white"
  #cursor
></div>
<div
  class="pointer-events-none fixed z-20 flex h-[80px] w-[80px] items-center justify-center bg-transparent font-extrabold uppercase text-white"
  #cursorLabel
>
  View
</div>
