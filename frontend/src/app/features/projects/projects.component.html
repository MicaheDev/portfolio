<section
  #container
  class="relative flex min-h-[100vh] w-full flex-col items-center justify-center overflow-hidden border-x-2 border-b-2 border-black  max-md:h-auto py-20 max-md:min-h-[60vh]"
>
  <h2
    class="title text-[20rem] font-extrabold uppercase leading-[20rem] max-lg:text-9xl max-lg:leading-normal max-md:text-8xl"
  >
    Works
  </h2>

  <div class="mx-auto flex w-[90%] flex-col">
    @if (!isLoading) {
      @for (project of uploadedProjects; track project.slug; let index = $index) {
        <article
          class="group flex w-full cursor-pointer flex-col gap-3 overflow-hidden border-b-2 border-black max-md:h-auto"
          (click)="transitionClick('/projects/' + project.slug)"
          (mouseenter)="onMouseEnter(index)"
          (mouseleave)="onMouseLeave(index)"
        >
          <h1
            class="relative overflow-hidden text-center text-[6rem] max-lg:text-5xl max-md:text-2xl max-lg:leading-normal font-extrabold uppercase leading-[6rem] text-black"
          >
            {{ project.title }}

            <span
              class="absolute inset-0 translate-x-[100%] bg-black text-white transition-transform duration-300  group-hover:translate-x-0"
              >{{ project.title }}</span
            >
          </h1>
        </article>
      }
    } @else {
      <div class="flex h-full w-full items-center justify-center">
        <h1 class="text-4xl">Loading...</h1>
      </div>
    }

    <app-modal [modalState]="modalState" [projects]="uploadedProjects" [isRendered]="isLoading" />
  </div>
