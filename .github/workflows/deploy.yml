name: Deploy to GitHub Pages

on:
  push:
    branches: [master] # Cambia a master si es tu rama principal

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-class: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload
        uses: withastro/action@v3
        # No necesitas configurar nada más, la acción detecta npm/pnpm/yarn
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
